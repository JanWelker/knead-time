name: PR preview

on:
  pull_request:
    types: [opened, reopened, synchronize, closed]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: pr-preview-${{ github.event.number }}
  cancel-in-progress: true

# rossjrw/pr-preview-action@v1.8.1 still pins JamesIves/github-pages-deploy-action
# v4.7.4 and marocchino/sticky-pull-request-comment v2.9.2, both Node 20. Opt
# them onto Node 24 ahead of the 2026-06-02 forced migration. Remove once
# upstream ships Node 24 pins.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  preview:
    # Fork PRs get a read-only GITHUB_TOKEN regardless of the permissions
    # block above, so the gh-pages push would fail with a red X on every
    # external contribution. Skip the job cleanly for forks.
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        if: github.event.action != 'closed'
        with:
          node-version: 24
          cache: npm

      - run: npm ci
        if: github.event.action != 'closed'

      - name: Resolve base path
        id: base
        if: github.event.action != 'closed'
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          OWNER="${GITHUB_REPOSITORY%%/*}"
          PR="${{ github.event.number }}"
          if [ "$REPO_NAME" = "${OWNER}.github.io" ]; then
            echo "value=/pr-preview/pr-${PR}" >> "$GITHUB_OUTPUT"
          else
            echo "value=/${REPO_NAME}/pr-preview/pr-${PR}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        if: github.event.action != 'closed'
        env:
          BASE_PATH: ${{ steps.base.outputs.value }}
        run: npm run build

      - name: Deploy preview
        uses: rossjrw/pr-preview-action@ffa7509e91a3ec8dfc2e5536c4d5c1acdf7a6de9 # v1.8.1
        with:
          source-dir: build
          preview-branch: gh-pages
          umbrella-dir: pr-preview
          action: auto
