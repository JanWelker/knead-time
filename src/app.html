<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" type="image/svg+xml" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="theme-color" content="#c8401a" />
		<meta name="description" content="Time-anchored Neapolitan pizza dough calculator" />
		<script>
			// Theme boot: apply dark before first paint. The legacy bare 'theme'
			// slot is read as a fallback until loadStoredTheme migrates it to
			// 'kneadtime:theme'. Storage access can throw (Chrome "Block all
			// cookies") — only the reads are guarded so a blocked storage still
			// honours the system preference.
			(function () {
				var stored = null;
				try {
					stored = localStorage.getItem('kneadtime:theme') || localStorage.getItem('theme');
				} catch (e) {}
				if (
					stored === 'dark' ||
					(stored !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches)
				) {
					document.documentElement.classList.add('dark');
				}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body
		data-sveltekit-preload-data="hover"
		class="bg-dough-50 min-h-screen text-stone-900 antialiased dark:bg-stone-950 dark:text-stone-100"
	>
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
